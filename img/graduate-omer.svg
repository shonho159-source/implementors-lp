<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241541"/>
      <stop offset="100%" stop-color="#1A0F2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#DDD2FB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#DDD2FB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>
  <!-- Subtle silhouette -->
  <g transform="translate(320.0, 340.0)" opacity="0.35">
    <circle cx="0" cy="-50" r="55" fill="none" stroke="#DDD2FB" stroke-width="2.5"/>
    <path d="M -90 80 Q -90 20 0 20 Q 90 20 90 80 L 90 130 L -90 130 Z" fill="none" stroke="#DDD2FB" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <!-- Name -->
  <text x="50%" y="78%" text-anchor="middle" font-family="Heebo, Arial, sans-serif" font-size="38" font-weight="800" fill="#DDD2FB" opacity="0.9">עומר</text>
  <!-- Role -->
  <text x="50%" y="86%" text-anchor="middle" font-family="Heebo, Arial, sans-serif" font-size="22" font-weight="500" fill="#9A8DC4" opacity="0.8">תפעול · לוגיסטיקה</text>
</svg>